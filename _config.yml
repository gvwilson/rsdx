title: Research Software Design by Example
repository: gvwilson/rsdx
author:
  name: Greg Wilson

chapters:
- title: "Initial Script"
  path: "script"
- title: "Parse Raw Data"
  path: "parse"
- title: "Geocoded Readings"
  path: "center"
- title: "Grid Abstraction"
  path: "grid"
- title: "Measure Performance"
  path: "perf"
- title: "Task Runner"
  path: "flow"
- title: "Lazy Algorithm"
  path: "lazy"
- title: "Measure Fractal Dimension"
  path: "dim"
- title: "Estimate Density vs. Distance"
  path: "density"

defaults:
- scope:
    path: ""
  values:
    layout: "default"

markdown: kramdown
highlighter: rouge

exclude:
  - CODE_OF_CONDUCT.md
  - LICENSE.md
  - README.md
  - pyproject.toml
  - requirements.txt
  - '.#*'
  - '*~'

permalink: pretty
